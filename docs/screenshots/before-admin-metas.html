<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Metas — ANTES (solo agentes)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #f9fafb; color: #111827; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body class="bg-zinc-50 min-h-screen">
<div class="max-w-7xl mx-auto px-4 py-6 space-y-4">

  <!-- Header -->
  <div>
    <h1 class="text-xl font-semibold text-gray-900">Metas Mensuales</h1>
    <p class="text-sm text-gray-500 mt-1">Cargá los objetivos de cada vendedor por mes.</p>
  </div>

  <!-- Toolbar -->
  <div class="flex items-center justify-between gap-3 flex-wrap">
    <div class="flex items-center gap-1">
      <button class="p-1.5 rounded-md border border-gray-200 text-gray-400 hover:bg-gray-100">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <span class="px-3 py-1.5 text-sm font-semibold text-gray-900 min-w-[130px] text-center">Junio 2026</span>
      <button class="p-1.5 rounded-md border border-gray-200 text-gray-400 hover:bg-gray-100">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
    <button class="flex items-center gap-1.5 px-3 py-1.5 border border-gray-200 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
      Duplicar mes anterior
    </button>
  </div>

  <!-- Table — BEFORE: solo agentes, 5 columnas -->
  <div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr>
            <th class="text-left py-2 px-3 text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">Vendedor</th>
            <th class="text-left py-2 px-3 text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">Clientes Nuevos</th>
            <th class="text-left py-2 px-3 text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">Pedidos</th>
            <th class="text-left py-2 px-3 text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">Monto Cobrado ($)</th>
            <th class="text-left py-2 px-3 text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">Conversión Leads (%)</th>
            <th class="text-left py-2 px-3 text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">% Cobertura cartera</th>
            <th class="text-left py-2 px-3 text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">Estado</th>
          </tr>
        </thead>
        <tbody>
          <!-- Agent row 1 (cargada) -->
          <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="py-2.5 px-3">
              <div class="flex items-center gap-2">
                <span class="w-7 h-7 rounded-full bg-indigo-500 inline-flex items-center justify-center text-white text-xs font-semibold">L</span>
                <span class="text-sm font-medium text-gray-900">Lucas Fernández</span>
              </div>
            </td>
            <td class="py-2.5 px-3"><input type="number" value="12" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/></td>
            <td class="py-2.5 px-3"><input type="number" value="50" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/></td>
            <td class="py-2.5 px-3"><input type="number" value="800000" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[90px]"/></td>
            <td class="py-2.5 px-3"><input type="number" value="25" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/></td>
            <td class="py-2.5 px-3"><input type="number" value="70" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[90px]"/></td>
            <td class="py-2.5 px-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">Cargada</span></td>
          </tr>
          <!-- Agent row 2 (cargada) -->
          <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="py-2.5 px-3">
              <div class="flex items-center gap-2">
                <span class="w-7 h-7 rounded-full bg-rose-500 inline-flex items-center justify-center text-white text-xs font-semibold">M</span>
                <span class="text-sm font-medium text-gray-900">Martina Gómez</span>
              </div>
            </td>
            <td class="py-2.5 px-3"><input type="number" value="8" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/></td>
            <td class="py-2.5 px-3"><input type="number" value="40" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/></td>
            <td class="py-2.5 px-3"><input type="number" value="600000" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[90px]"/></td>
            <td class="py-2.5 px-3"><input type="number" value="20" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/></td>
            <td class="py-2.5 px-3"><input type="number" value="65" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[90px]"/></td>
            <td class="py-2.5 px-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">Cargada</span></td>
          </tr>
          <!-- Agent row 3 (pendiente) -->
          <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="py-2.5 px-3">
              <div class="flex items-center gap-2">
                <span class="w-7 h-7 rounded-full bg-amber-500 inline-flex items-center justify-center text-white text-xs font-semibold">C</span>
                <span class="text-sm font-medium text-gray-900">Carlos Ruiz</span>
              </div>
            </td>
            <td class="py-2.5 px-3"><input type="number" value="0" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/></td>
            <td class="py-2.5 px-3"><input type="number" value="0" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/></td>
            <td class="py-2.5 px-3"><input type="number" value="0" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[90px]"/></td>
            <td class="py-2.5 px-3"><input type="number" value="0" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/></td>
            <td class="py-2.5 px-3"><input type="number" value="0" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[90px]"/></td>
            <td class="py-2.5 px-3">
              <div class="flex items-center gap-2 justify-between">
                <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700">Pendiente</span>
                <button class="px-2.5 py-1 bg-blue-600 text-white rounded text-xs font-medium">Guardar</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Summary -->
  <p class="text-xs text-gray-400 text-right">2 de 3 vendedores con meta cargada para Junio 2026</p>

</div>
</body>
</html>
